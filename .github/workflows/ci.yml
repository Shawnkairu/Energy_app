name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true
  FORCE_COLOR: 1

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false  # flipped post-sprint; jobs are required

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test-shared:
    name: Shared package tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false  # flipped post-sprint; jobs are required

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shared tests
        run: npm run test --workspace @emappa/shared

      - name: Run shared consistency audit
        run: npm run audit:shared

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false  # flipped post-sprint; jobs are required

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: emappa
          POSTGRES_USER: emappa
          POSTGRES_PASSWORD: emappa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emappa -d emappa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      EMAPPA_DATABASE_URL: postgresql+asyncpg://emappa:emappa@localhost:5432/emappa
      EMAPPA_JWT_SECRET: ci-only-change-me
      EMAPPA_ALLOW_DEV_OTP_CONSOLE: "true"
      EMAPPA_ADMIN_EMAILS: admin@emappa.test
      EMAPPA_RESEND_API_KEY: ""
      EMAPPA_RESEND_FROM: auth@emappa.test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies (from lockfile for reproducibility)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock

      - name: Run migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false  # flipped post-sprint; jobs are required

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: false  # flipped post-sprint; jobs are required

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build
