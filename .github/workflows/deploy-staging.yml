name: Deploy staging

on:
  push:
    tags:
      - "v*-pilot"

permissions:
  contents: read

env:
  CI: true
  FORCE_COLOR: 1

jobs:
  deploy-staging:
    name: Build and deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_WEBSITE_PROJECT_ID: ${{ secrets.VERCEL_WEBSITE_PROJECT_ID }}
      VERCEL_COCKPIT_PROJECT_ID: ${{ secrets.VERCEL_COCKPIT_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Build all workspaces
        run: npm run build

      - name: Deploy backend to Fly.io
        if: ${{ env.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Release backend on Fly.io
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: |
          if [ ! -f infra/fly.toml ]; then
            echo "::notice title=Backend deploy skipped::infra/fly.toml is not present yet."
            exit 0
          fi
          flyctl deploy --config infra/fly.toml --remote-only

      - name: Skip backend deploy without Fly token
        if: ${{ env.FLY_API_TOKEN == '' }}
        run: echo "::notice title=Backend deploy skipped::Set FLY_API_TOKEN to deploy the backend staging app."

      - name: Deploy website to Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_WEBSITE_PROJECT_ID != '' }}
        working-directory: website
        env:
          VERCEL_PROJECT_ID: ${{ env.VERCEL_WEBSITE_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --yes --prod --token "$VERCEL_TOKEN"

      - name: Skip website deploy without Vercel secrets
        if: ${{ !(env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_WEBSITE_PROJECT_ID != '') }}
        run: echo "::notice title=Website deploy skipped::Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_WEBSITE_PROJECT_ID."

      - name: Deploy cockpit to Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_COCKPIT_PROJECT_ID != '' }}
        working-directory: cockpit
        env:
          VERCEL_PROJECT_ID: ${{ env.VERCEL_COCKPIT_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --yes --prod --token "$VERCEL_TOKEN"

      - name: Skip cockpit deploy without Vercel secrets
        if: ${{ !(env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_COCKPIT_PROJECT_ID != '') }}
        run: echo "::notice title=Cockpit deploy skipped::Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_COCKPIT_PROJECT_ID."
