services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emappa
      POSTGRES_USER: emappa
      POSTGRES_PASSWORD: emappa
    ports:
      - "5432:5432"
    volumes:
      - emappa_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emappa -d emappa"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      EMAPPA_DATABASE_URL: postgresql+asyncpg://emappa:emappa@postgres:5432/emappa
      EMAPPA_JWT_SECRET: dev-only-change-me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  emappa_postgres:
